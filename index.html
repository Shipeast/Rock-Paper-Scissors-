<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Cartoon RPS Mobile</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap');

        :root {
            --bg: #80e0ff;
            --panel: #ffffff;
            --primary: #ff8000;
            --secondary: #4CAF50;
            --danger: #FF5722;
            --border: #e0e0e0;
            --shadow: rgba(0, 0, 0, 0.2);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent; /* Odstraní modrý záblesk na mobilu */
        }

        body {
            background: var(--bg);
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            justify-content: space-between;
            overflow: hidden;
        }

        /* Horní část se skóre */
        .header {
            background: var(--panel);
            margin: 15px;
            padding: 15px 25px;
            border-radius: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 8px 0 var(--shadow);
            border: 4px solid var(--primary);
        }

        .header h1 {
            font-family: 'Fredoka One', cursive;
            font-size: 1.1rem;
            color: var(--primary);
            line-height: 1;
        }

        #score {
            font-family: 'Fredoka One', cursive;
            font-size: 2.5rem;
            color: var(--primary);
        }

        /* Střední část - Aréna */
        .arena {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 20px;
        }

        .battle-row {
            display: flex;
            width: 100%;
            justify-content: space-around;
            align-items: center;
            padding: 0 10px;
        }

        .slot {
            text-align: center;
            width: 130px;
        }

        .slot label {
            display: block;
            font-family: 'Fredoka One', cursive;
            font-size: 0.8rem;
            margin-bottom: 10px;
            color: white;
            text-shadow: 2px 2px 0 var(--shadow);
        }

        .view-circle {
            width: 110px;
            height: 110px;
            background: var(--panel);
            border-radius: 50%;
            border: 5px solid var(--border);
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 10px 0 var(--shadow), inset 0 5px 10px rgba(0,0,0,0.1);
            font-size: 2rem;
            overflow: hidden;
        }

        .view-circle img {
            width: 85%;
            height: 85%;
            object-fit: contain;
        }

        #result-text {
            font-family: 'Fredoka One', cursive;
            font-size: 1.8rem;
            text-align: center;
            margin: 20px 0;
            color: white;
            text-shadow: 3px 3px 0 var(--shadow);
            min-height: 2.2rem;
        }

        /* Spodní ovládání */
        .controls-panel {
            background: var(--panel);
            padding: 30px 15px 40px 15px; /* Více místa dole pro moderní mobily */
            border-radius: 40px 40px 0 0;
            box-shadow: 0 -10px 20px rgba(0,0,0,0.1);
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .btn {
            width: 90px;
            height: 90px;
            border-radius: 20px;
            border: none;
            background: #f0f0f0;
            border-bottom: 6px solid #ccc;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.1s;
        }

        .btn:active {
            transform: translateY(4px);
            border-bottom-width: 2px;
        }

        .btn img {
            width: 70%;
            height: 70%;
            object-fit: contain;
        }

        /* Barvy pro tlačítka */
        .btn-rock { border-color: #888; }
        .btn-paper { border-color: #2196F3; }
        .btn-scissors { border-color: #E91E63; }

        /* Animace */
        @keyframes bounceIn {
            0% { transform: scale(0.3); opacity: 0; }
            70% { transform: scale(1.1); }
            100% { transform: scale(1); opacity: 1; }
        }

        .pop-anim { animation: bounceIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

        #reset-link {
            position: absolute;
            bottom: 10px;
            width: 100%;
            text-align: center;
            font-family: 'Fredoka One', cursive;
            font-size: 0.7rem;
            color: #444;
            text-decoration: none;
            opacity: 0.5;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>SKÓRE<br>HRY</h1>
        <div id="score">0</div>
    </div>

    <div class="arena">
        <div id="result-text">HRAJ!</div>
        
        <div class="battle-row">
            <div class="slot">
                <label>TY</label>
                <div class="view-circle" id="player-view">?</div>
            </div>
            <div class="slot">
                <label>CPU</label>
                <div class="view-circle" id="cpu-view">?</div>
            </div>
        </div>
    </div>

    <div class="controls-panel">
        <button class="btn btn-rock" onclick="play('rock', 'IMG_4406.png')">
            <img src="IMG_4406.png" alt="Kámen">
        </button>
        <button class="btn btn-paper" onclick="play('paper', 'IMG_4408.png')">
            <img src="IMG_4408.png" alt="Papír">
        </button>
        <button class="btn btn-scissors" onclick="play('scissors', 'IMG_4407.png')">
            <img src="IMG_4407.png" alt="Nůžky">
        </button>
        <a href="#" id="reset-link" onclick="resetGame()">VYNULOVAT SKÓRE</a>
    </div>

    <script>
        let score = 0;
        const choices = [
            { id: 'rock', img: 'IMG_4406.png' },
            { id: 'paper', img: 'IMG_4408.png' },
            { id: 'scissors', img: 'IMG_4407.png' }
        ];

        function play(playerChoiceId, playerImgSrc) {
            const cpuChoice = choices[Math.floor(Math.random() * 3)];
            
            const pView = document.getElementById('player-view');
            const cView = document.getElementById('cpu-view');
            const resText = document.getElementById('result-text');

            // Reset animací
            pView.classList.remove('pop-anim');
            cView.classList.remove('pop-anim');
            void pView.offsetWidth; // Trigger reflow

            // Zobrazení volby
            pView.innerHTML = `<img src="${playerImgSrc}" class="pop-anim">`;
            cView.innerHTML = `<img src="${cpuChoice.img}" class="pop-anim">`;

            // Logika
            if (playerChoiceId === cpuChoice.id) {
                resText.innerText = "REMÍZA!";
                resText.style.color = "white";
            } else if (
                (playerChoiceId === 'rock' && cpuChoice.id === 'scissors') ||
                (playerChoiceId === 'paper' && cpuChoice.id === 'rock') ||
                (playerChoiceId === 'scissors' && cpuChoice.id === 'paper')
            ) {
                score++;
                resText.innerText = "VÝHRA! 🎉";
                resText.style.color = "#00ff88";
            } else {
                if(score > 0) score--;
                resText.innerText = "PROHRA... 💀";
                resText.style.color = "#ff4444";
            }

            document.getElementById('score').innerText = score;
        }

        function resetGame() {
            score = 0;
            document.getElementById('score').innerText = "0";
            document.getElementById('player-view').innerHTML = "?";
            document.getElementById('cpu-view').innerHTML = "?";
            document.getElementById('result-text').innerText = "HRAJ!";
            document.getElementById('result-text').style.color = "white";
        }
    </script>
</body>
</html>
