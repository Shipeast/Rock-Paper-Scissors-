<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Cartoon RPS</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap');

        :root {
            --bg-color: linear-gradient(135deg, #80e0ff 0%, #47a0ff 100%);
            --primary-color: #ff8000;
            --secondary-color: #4CAF50;
            --tertiary-color: #FF5722;
            --panel-bg: #fdfdfd;
            --shadow-deep: rgba(0, 0, 0, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: var(--bg-color);
            background-attachment: fixed;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', sans-serif;
            padding: 15px;
        }

        .game-wrapper {
            background-color: var(--panel-bg);
            border: 5px solid #ccc;
            border-radius: 30px;
            padding: 2rem;
            text-align: center;
            box-shadow: 0 20px 0 var(--shadow-deep);
            width: 100%;
            max-width: 500px; /* Šířka na PC */
        }

        /* Skóre */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #fff3e0;
            border: 4px solid var(--primary-color);
            border-radius: 20px;
            padding: 15px 20px;
            margin-bottom: 2rem;
            box-shadow: 0 6px 0 rgba(0,0,0,0.1);
        }

        .header h1 {
            font-family: 'Fredoka One', cursive;
            font-size: clamp(1rem, 4vw, 1.2rem);
            color: var(--primary-color);
            text-align: left;
            line-height: 1.1;
        }

        #score {
            font-family: 'Fredoka One', cursive;
            font-size: clamp(2rem, 8vw, 3rem);
            color: var(--primary-color);
        }

        /* Arena */
        .arena {
            display: flex;
            justify-content: space-around;
            align-items: center;
            margin-bottom: 2.5rem;
            gap: 10px;
        }

        .slot span {
            display: block;
            font-family: 'Fredoka One', cursive;
            font-size: 0.8rem;
            margin-bottom: 10px;
            color: #555;
        }

        .choice-display {
            width: clamp(80px, 22vw, 110px);
            height: clamp(80px, 22vw, 110px);
            background: #eee;
            border: 4px solid #ddd;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 8px 0 var(--shadow-deep), inset 0 4px 8px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .choice-display img {
            width: 85%;
            height: 85%;
            object-fit: contain;
        }

        #result-text {
            font-family: 'Fredoka One', cursive;
            font-size: clamp(1.2rem, 5vw, 1.6rem);
            min-width: 80px;
        }

        /* Tlačítka */
        .controls {
            display: flex;
            justify-content: center;
            gap: clamp(10px, 4vw, 20px);
        }

        .btn {
            background: #fff;
            border: 4px solid var(--primary-color);
            width: clamp(70px, 20vw, 95px);
            height: clamp(70px, 20vw, 95px);
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 8px 0 var(--shadow-deep);
            transition: all 0.1s;
            padding: 10px;
        }

        .btn:active {
            transform: translateY(4px);
            box-shadow: 0 4px 0 var(--shadow-deep);
        }

        .btn img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* Reset tlačítko */
        #reset-btn {
            margin-top: 2rem;
            background: none;
            border: none;
            color: #999;
            font-family: 'Fredoka One', cursive;
            font-size: 0.8rem;
            cursor: pointer;
            text-decoration: underline;
            visibility: hidden;
        }

        /* Animace výhry/prohry */
        @keyframes pop {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .animate { animation: pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }

        /* Mobilní úprava pro velmi malé telefony */
        @media (max-width: 360px) {
            .game-wrapper { padding: 1rem; }
            .arena { gap: 5px; }
        }
    </style>
</head>
<body>

    <div class="game-wrapper">
        <div class="header">
            <h1>KÁMEN<br>PAPÍR<br>NŮŽKY</h1>
            <div id="score">0</div>
        </div>

        <div class="arena">
            <div class="slot">
                <span>TY</span>
                <div class="choice-display" id="player-view">?</div>
            </div>
            
            <div id="result-text">HRAJ!</div>

            <div class="slot">
                <span>CPU</span>
                <div class="choice-display" id="cpu-view">?</div>
            </div>
        </div>

        <div class="controls">
            <button class="btn" onclick="play('rock', 'IMG_4406.png')">
                <img src="IMG_4406.png" alt="Kámen">
            </button>
            <button class="btn" onclick="play('paper', 'IMG_4408.png')">
                <img src="IMG_4408.png" alt="Papír">
            </button>
            <button class="btn" onclick="play('scissors', 'IMG_4407.png')">
                <img src="IMG_4407.png" alt="Nůžky">
            </button>
        </div>

        <button id="reset-btn" onclick="resetGame()">VYMAZAT SKÓRE</button>
    </div>

    <script>
        let score = 0;
        const choices = [
            { id: 'rock', img: 'IMG_4406.png' },
            { id: 'paper', img: 'IMG_4408.png' },
            { id: 'scissors', img: 'IMG_4407.png' }
        ];
        
        const pView = document.getElementById('player-view');
        const cView = document.getElementById('cpu-view');
        const resText = document.getElementById('result-text');
        const scoreDisp = document.getElementById('score');
        const resetBtn = document.getElementById('reset-btn');

        function play(playerChoiceId, playerImgSrc) {
            const cpuChoice = choices[Math.floor(Math.random() * 3)];
            
            pView.innerHTML = `<img src="${playerImgSrc}" class="animate">`;
            cView.innerHTML = `<img src="${cpuChoice.img}" class="animate">`;
            
            if (playerChoiceId === cpuChoice.id) {
                resText.innerText = "REMÍZA";
                resText.style.color = "#888";
            } else if (
                (playerChoiceId === 'rock' && cpuChoice.id === 'scissors') ||
                (playerChoiceId === 'paper' && cpuChoice.id === 'rock') ||
                (playerChoiceId === 'scissors' && cpuChoice.id === 'paper')
            ) {
                score++;
                resText.innerText = "VÝHRA!";
                resText.style.color = "var(--secondary-color)";
            } else {
                if(score > 0) score--;
                resText.innerText = "PROHRA";
                resText.style.color = "var(--tertiary-color)";
            }

            scoreDisp.innerText = score;
            resetBtn.style.visibility = "visible";
        }

        function resetGame() {
            score = 0;
            scoreDisp.innerText = "0";
            pView.innerHTML = "?";
            cView.innerHTML = "?";
            resText.innerText = "HRAJ!";
            resText.style.color = "#000";
            resetBtn.style.visibility = "hidden";
        }
    </script>
</body>
</html>
